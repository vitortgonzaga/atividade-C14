name: CI-CD Password Validator

permissions:
  contents: write

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

env:
  NODE_VERSION: 22
  PROD_API_URL: ${{ vars.PROD_API_URL }}
  RENDER_DEPLOY_HOOK_URL: ${{ secrets.RENDER_DEPLOY_HOOK_URL }}
  VERCEL_DEPLOY_HOOK_URL: ${{ secrets.VERCEL_DEPLOY_HOOK_URL }}
  NOTIFY_EMAIL_TO: ${{ vars.NOTIFY_EMAIL_TO }}
  SMTP_HOST: ${{ secrets.SMTP_HOST }}
  SMTP_PORT: ${{ vars.SMTP_PORT }}
  SMTP_USER: ${{ secrets.SMTP_USER }}
  SMTP_PASS: ${{ secrets.SMTP_PASS }}
  SMTP_FROM: ${{ vars.SMTP_FROM }}

jobs:
  backend-tests:
    name: Testes Backend
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install backend dependencies
        working-directory: backend
        run: npm install

      - name: Run tests with coverage
        working-directory: backend
        run: npm run test:ci

      - name: Upload backend coverage artifact
        uses: actions/upload-artifact@v7
        with:
          name: backend-coverage
          path: backend/coverage

      - name: Upload backend test report artifact
        uses: actions/upload-artifact@v7
        with:
          name: backend-test-report
          path: backend/coverage/test-report.json

  build:
    name: Build Frontend e Backend
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install backend dependencies
        working-directory: backend
        run: npm install

      - name: Build backend
        working-directory: backend
        run: npm run build

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm install

      - name: Build frontend
        working-directory: frontend
        env:
          VITE_API_URL: ${{ env.PROD_API_URL }}
        run: npm run build

      - name: Package artifacts
        run: |
          tar -czf frontend-dist.tar.gz -C frontend dist
          tar -czf backend-source.tar.gz -C backend src package.json

      - name: Upload frontend build artifact
        uses: actions/upload-artifact@v7
        with:
          name: frontend-dist
          path: frontend-dist.tar.gz

      - name: Upload backend artifact
        uses: actions/upload-artifact@v7
        with:
          name: backend-source
          path: backend-source.tar.gz

  deploy:
    name: Deploy Render e Vercel
    runs-on: ubuntu-latest
    needs: [backend-tests, build]

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Download artifacts
        uses: actions/download-artifact@v8

      - name: Trigger Render deploy (backend)
        run: curl -X POST ${{ secrets.RENDER_DEPLOY_HOOK_URL }}

      - name: Trigger Vercel deploy (frontend)
        run: curl -X POST ${{ secrets.VERCEL_DEPLOY_HOOK_URL }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v1.0.${{ github.run_number }}
          name: Release v1.0.${{ github.run_number }}
          files: |
            frontend-dist/frontend-dist.tar.gz
            backend-source/backend-source.tar.gz
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  notify:
    name: Notificação
    runs-on: ubuntu-latest
    needs: [backend-tests, build, deploy]
    if: always()

    steps:
      - name: Generate notification message
        id: message
        run: |
          STATUS="SUCCESS"

          if [ "${{ needs.backend-tests.result }}" != "success" ] || \
             [ "${{ needs.build.result }}" != "success" ] || \
             [ "${{ needs.deploy.result }}" != "success" ]; then
            STATUS="FAILURE"
          fi

          echo "status=$STATUS" >> $GITHUB_OUTPUT

      - name: Show notification
        run: |
          echo "=============================="
          echo "CI/CD Notification"
          echo "=============================="
          echo "Status Geral: ${{ steps.message.outputs.status }}"
          echo ""
          echo "Testes:  ${{ needs.backend-tests.result }}"
          echo "Build:   ${{ needs.build.result }}"
          echo "Deploy:  ${{ needs.deploy.result }}"
          echo ""
          echo "API Prod: ${{ env.PROD_API_URL }}"
          echo "Destino:  ${{ env.NOTIFY_EMAIL_TO }}"
          echo "=============================="

      - name: Send e-mail notification
        if: ${{ env.SMTP_HOST != '' && env.SMTP_USER != '' && env.SMTP_PASS != '' && env.SMTP_FROM != '' && env.NOTIFY_EMAIL_TO != '' }}
        env:
          JOB_STATUS: ${{ steps.message.outputs.status }}
          TEST_RESULT: ${{ needs.backend-tests.result }}
          BUILD_RESULT: ${{ needs.build.result }}
          DEPLOY_RESULT: ${{ needs.deploy.result }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          python3 - <<'PY'
          import os
          import smtplib
          from email.mime.text import MIMEText
          from email.mime.multipart import MIMEMultipart

          status = os.environ.get("JOB_STATUS", "UNKNOWN")
          test_result = os.environ.get("TEST_RESULT", "unknown")
          build_result = os.environ.get("BUILD_RESULT", "unknown")
          deploy_result = os.environ.get("DEPLOY_RESULT", "unknown")
          run_url = os.environ.get("RUN_URL", "")

          sender = os.environ["SMTP_FROM"]
          recipient = os.environ["NOTIFY_EMAIL_TO"]

          msg = MIMEMultipart()
          msg["From"] = sender
          msg["To"] = recipient
          msg["Subject"] = f"[CI/CD] Password Validator - {status}"

          body = (
              "CI/CD Notification\n\n"
              f"Status geral: {status}\n"
              f"Testes: {test_result}\n"
              f"Build: {build_result}\n"
              f"Deploy: {deploy_result}\n"
              f"API Prod: {os.environ.get('PROD_API_URL', '')}\n"
              f"Run: {run_url}\n"
          )
          msg.attach(MIMEText(body, "plain", "utf-8"))

          host = os.environ["SMTP_HOST"]
          port = int(os.environ.get("SMTP_PORT") or "587")
          user = os.environ["SMTP_USER"]
          password = os.environ["SMTP_PASS"]

          with smtplib.SMTP(host, port, timeout=30) as server:
              server.starttls()
              server.login(user, password)
              server.sendmail(sender, [recipient], msg.as_string())

          print("E-mail de notificação enviado com sucesso.")
          PY

      - name: Skip e-mail notification when SMTP is not configured
        if: ${{ !(env.SMTP_HOST != '' && env.SMTP_USER != '' && env.SMTP_PASS != '' && env.SMTP_FROM != '' && env.NOTIFY_EMAIL_TO != '') }}
        run: |
          echo "SMTP não configurado. O envio de e-mail foi ignorado."
