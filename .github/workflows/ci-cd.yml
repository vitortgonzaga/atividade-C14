name: CI-CD Password Validator

permissions:
  contents: write

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

env:
  NODE_VERSION: 22
  PROD_API_URL: ${{ vars.PROD_API_URL }}
  RENDER_DEPLOY_HOOK_URL: ${{ secrets.RENDER_DEPLOY_HOOK_URL }}
  VERCEL_DEPLOY_HOOK_URL: ${{ secrets.VERCEL_DEPLOY_HOOK_URL }}
  NOTIFY_EMAIL_TO: ${{ vars.NOTIFY_EMAIL_TO }}

jobs:
  backend-tests:
    name: Testes Backend
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install backend dependencies
        working-directory: backend
        run: npm install

      - name: Run tests with coverage
        working-directory: backend
        run: npm run test:ci

      - name: Upload backend coverage artifact
        uses: actions/upload-artifact@v7
        with:
          name: backend-coverage
          path: backend/coverage

      - name: Upload backend test report artifact
        uses: actions/upload-artifact@v7
        with:
          name: backend-test-report
          path: backend/coverage/test-report.json

  build:
    name: Build Frontend e Backend
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install backend dependencies
        working-directory: backend
        run: npm install

      - name: Build backend
        working-directory: backend
        run: npm run build

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm install

      - name: Build frontend
        working-directory: frontend
        env:
          VITE_API_URL: ${{ env.PROD_API_URL }}
        run: npm run build

      - name: Package artifacts
        run: |
          tar -czf frontend-dist.tar.gz -C frontend dist
          tar -czf backend-source.tar.gz -C backend src package.json

      - name: Upload frontend build artifact
        uses: actions/upload-artifact@v7
        with:
          name: frontend-dist
          path: frontend-dist.tar.gz

      - name: Upload backend artifact
        uses: actions/upload-artifact@v7
        with:
          name: backend-source
          path: backend-source.tar.gz

  deploy:
    name: Deploy Render e Vercel
    runs-on: ubuntu-latest
    needs: [backend-tests, build]

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Download artifacts
        uses: actions/download-artifact@v8

      - name: Trigger Render deploy (backend)
        run: curl -X POST ${{ secrets.RENDER_DEPLOY_HOOK_URL }}

      - name: Trigger Vercel deploy (frontend)
        run: curl -X POST ${{ secrets.VERCEL_DEPLOY_HOOK_URL }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v1.0.${{ github.run_number }}
          name: Release v1.0.${{ github.run_number }}
          files: |
            frontend-dist/frontend-dist.tar.gz
            backend-source/backend-source.tar.gz
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  notify:
    name: Notificação
    runs-on: ubuntu-latest
    needs: [backend-tests, build, deploy]
    if: always()

    steps:
      - name: Generate notification message
        id: message
        run: |
          STATUS="SUCCESS"

          if [ "${{ needs.backend-tests.result }}" != "success" ] || \
             [ "${{ needs.build.result }}" != "success" ] || \
             [ "${{ needs.deploy.result }}" != "success" ]; then
            STATUS="FAILURE"
          fi

          echo "status=$STATUS" >> $GITHUB_OUTPUT

      - name: Show notification
        run: |
          echo "=============================="
          echo "CI/CD Notification"
          echo "=============================="
          echo "Status Geral: ${{ steps.message.outputs.status }}"
          echo ""
          echo "Testes:  ${{ needs.backend-tests.result }}"
          echo "Build:   ${{ needs.build.result }}"
          echo "Deploy:  ${{ needs.deploy.result }}"
          echo ""
          echo "API Prod: ${{ env.PROD_API_URL }}"
          echo "Destino:  ${{ env.NOTIFY_EMAIL_TO }}"
          echo "=============================="
